<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Room - Grand Stay Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }

        nav {
            padding: 20px 60px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(13,13,13,0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226,185,111,0.15); position: sticky; top: 0; z-index: 100;
        }
        .nav-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: #e2b96f; }
        .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; margin-left: 30px; font-size: 14px; transition: color 0.3s; }
        .nav-links a:hover { color: #e2b96f; }

        .container { max-width: 700px; margin: 60px auto; padding: 0 20px; }
        .back-link { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 30px; transition: color 0.3s; }
        .back-link:hover { color: #e2b96f; }

        .card {
            background: #111; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, rgba(226,185,111,0.12), rgba(226,185,111,0.04));
            border-bottom: 1px solid rgba(226,185,111,0.15);
            padding: 35px 40px;
        }
        .card-header span { color: #e2b96f; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
        .card-header h2 { font-family: 'Playfair Display', serif; font-size: 30px; margin-top: 8px; }

        .room-info { padding: 30px 40px; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; gap: 30px; flex-wrap: wrap; }
        .room-info-item { }
        .room-info-item .label { font-size: 12px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .room-info-item .value { font-size: 18px; font-weight: 600; }
        .room-info-item .value.price { color: #e2b96f; font-size: 24px; }

        .form-body { padding: 35px 40px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
        input[type="date"] {
            width: 100%; padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s; outline: none;
            color-scheme: dark;
        }
        input[type="date"]:focus { border-color: #e2b96f; background: rgba(226,185,111,0.05); }

        .error-box {
            background: rgba(220,53,69,0.1); border: 1px solid rgba(220,53,69,0.3);
            color: #ff6b7a; padding: 12px 16px; border-radius: 10px;
            font-size: 14px; margin-bottom: 20px;
        }
        .btn-submit {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #e2b96f, #f0ca85);
            color: #0a0a0a; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 25px rgba(226,185,111,0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(226,185,111,0.45); }
        .cancel-link { display: block; text-align: center; margin-top: 15px; color: rgba(255,255,255,0.3); text-decoration: none; font-size: 14px; transition: color 0.3s; }
        .cancel-link:hover { color: #ff6b6b; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">🏨 Grand Stay</div>
        <div class="nav-links">
            <a href="/rooms">← Back to Rooms</a>
        </div>
    </nav>

    <div class="container">
        <a href="/rooms" class="back-link">← Back to Rooms</a>
        <div class="card">
            <div class="card-header">
                <span>Reservation</span>
                <h2>Book Your Room</h2>
            </div>
            <div class="room-info">
                <div class="room-info-item">
                    <div class="label">Room Number</div>
                    <div class="value">{{ room['room_number'] }}</div>
                </div>
                <div class="room-info-item">
                    <div class="label">Room Type</div>
                    <div class="value">{{ room['room_type'] }}</div>
                </div>
                <div class="room-info-item">
                    <div class="label">Price</div>
                    <div class="value price">${{ room['price_per_night'] }} / night</div>
                </div>
            </div>
            <div class="form-body">
                {% if error %}
                <div class="error-box">⚠️ {{ error }}</div>
                {% endif %}
                <form method="POST">
                    <div class="form-group">
                        <label>Check-in Date</label>
                        <input type="date" name="check_in" required>
                    </div>
                    <div class="form-group">
                        <label>Check-out Date</label>
                        <input type="date" name="check_out" required>
                    </div>
                    <button type="submit" class="btn-submit">✓ Confirm Booking & Pay</button>
                </form>
                <a href="/rooms" class="cancel-link">Cancel reservation</a>
            </div>
        </div>
    </div>
</body>
</html>
