<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Grand Stay Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex;
            background: #0a0a0a;
        }
        .left-panel {
            flex: 1; display: none;
            background: linear-gradient(135deg, rgba(10,10,10,0.5), rgba(10,10,10,0.2)),
                        url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=1200') center/cover;
            flex-direction: column; justify-content: flex-end; padding: 60px;
        }
        @media(min-width: 900px) { .left-panel { display: flex; } }
        .left-panel-badge {
            background: rgba(226,185,111,0.15); border: 1px solid rgba(226,185,111,0.4);
            color: #e2b96f; padding: 8px 18px; border-radius: 30px;
            font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
            display: inline-block; margin-bottom: 20px;
        }
        .left-panel h2 { font-family: 'Playfair Display', serif; font-size: 48px; color: white; line-height: 1.2; margin-bottom: 15px; }
        .left-panel p { color: rgba(255,255,255,0.6); font-size: 16px; line-height: 1.7; }

        .right-panel {
            width: 100%; max-width: 500px;
            display: flex; flex-direction: column; justify-content: center;
            padding: 60px 50px;
            background: #0d0d0d;
            border-left: 1px solid rgba(255,255,255,0.06);
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: #e2b96f; margin-bottom: 50px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 34px; color: white; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.4); font-size: 15px; margin-bottom: 40px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
        input {
            width: 100%; padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s, background 0.3s;
            outline: none;
        }
        input:focus { border-color: #e2b96f; background: rgba(226,185,111,0.05); }
        input::placeholder { color: rgba(255,255,255,0.25); }

        .btn-submit {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #e2b96f, #f0ca85);
            color: #0a0a0a; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: 'Inter', sans-serif; letter-spacing: 0.5px;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            box-shadow: 0 8px 25px rgba(226,185,111,0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(226,185,111,0.45); }

        .error-box {
            background: rgba(220,53,69,0.1); border: 1px solid rgba(220,53,69,0.3);
            color: #ff6b7a; padding: 12px 16px; border-radius: 10px;
            font-size: 14px; margin-bottom: 20px;
        }
        .footer-links { margin-top: 30px; text-align: center; }
        .footer-links p { color: rgba(255,255,255,0.4); font-size: 14px; }
        .footer-links a { color: #e2b96f; text-decoration: none; font-weight: 500; }
        .footer-links a:hover { text-decoration: underline; }
        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 25px 0; }
        .back-link { display: block; text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; text-decoration: none; transition: color 0.3s; }
        .back-link:hover { color: #e2b96f; }
    </style>
</head>
<body>
    <div class="left-panel">
        <div>
            <div class="left-panel-badge">✦ Join Us Today</div>
            <h2>Start Your<br>Luxury Journey</h2>
            <p>Create an account and unlock exclusive rates, early check-in, and personalized service.</p>
        </div>
    </div>
    <div class="right-panel">
        <div class="logo">🏨 Grand Stay</div>
        <h2>Create Account</h2>
        <p class="subtitle">Join thousands of happy guests</p>

        {% if error %}
        <div class="error-box">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required>
            </div>
            <button type="submit" class="btn-submit">Create Account →</button>
        </form>

        <div class="footer-links">
            <p>Already have an account? <a href="/login">Sign in here</a></p>
        </div>
        <hr class="divider">
        <a href="/" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
