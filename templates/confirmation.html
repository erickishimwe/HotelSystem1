<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - Grand Stay Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; display: flex; flex-direction: column; }

        nav {
            padding: 20px 60px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(13,13,13,0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226,185,111,0.15);
        }
        .nav-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: #e2b96f; }
        .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; margin-left: 30px; font-size: 14px; transition: color 0.3s; }
        .nav-links a:hover { color: #e2b96f; }

        .container { max-width: 600px; margin: 60px auto; padding: 0 20px; flex: 1; }

        .success-card {
            background: #111; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; overflow: hidden; text-align: center;
        }
        .success-header {
            background: linear-gradient(135deg, rgba(40,167,69,0.15), rgba(40,167,69,0.05));
            border-bottom: 1px solid rgba(40,167,69,0.2);
            padding: 50px 40px 40px;
        }
        .checkmark {
            width: 80px; height: 80px; background: rgba(40,167,69,0.15);
            border: 2px solid rgba(40,167,69,0.4);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 36px; margin: 0 auto 20px;
        }
        .success-header h2 { font-family: 'Playfair Display', serif; font-size: 32px; color: #4caf50; margin-bottom: 8px; }
        .success-header p { color: rgba(255,255,255,0.5); font-size: 15px; }

        .booking-details { padding: 35px 40px; }
        .detail-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: rgba(255,255,255,0.4); font-size: 14px; }
        .detail-value { font-weight: 600; font-size: 15px; }
        .detail-value.green { color: #4caf50; }
        .detail-value.gold { color: #e2b96f; }

        .actions { padding: 0 40px 40px; display: flex; gap: 15px; flex-wrap: wrap; }
        .btn-primary {
            flex: 1; padding: 14px;
            background: linear-gradient(135deg, #e2b96f, #f0ca85);
            color: #0a0a0a; text-align: center; text-decoration: none;
            border-radius: 12px; font-weight: 700; font-size: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(226,185,111,0.25);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(226,185,111,0.4); }
        .btn-outline {
            flex: 1; padding: 14px;
            background: transparent; color: white;
            text-align: center; text-decoration: none;
            border-radius: 12px; font-weight: 500; font-size: 15px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: border-color 0.3s, color 0.3s;
        }
        .btn-outline:hover { border-color: #e2b96f; color: #e2b96f; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">🏨 Grand Stay</div>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="success-card">
            <div class="success-header">
                <div class="checkmark">✓</div>
                <h2>Booking Confirmed!</h2>
                <p>Thank you for choosing Grand Stay Hotel</p>
            </div>
            <div class="booking-details">
                <div class="detail-row">
                    <span class="detail-label">Booking ID</span>
                    <span class="detail-value gold">#{{ booking['id'] }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Check-in</span>
                    <span class="detail-value">{{ booking['check_in'] }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Check-out</span>
                    <span class="detail-value">{{ booking['check_out'] }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Booking Status</span>
                    <span class="detail-value green">✓ {{ booking['status'] }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Payment</span>
                    <span class="detail-value green">✓ Paid</span>
                </div>
            </div>
            <div class="actions">
                <a href="/my-bookings" class="btn-outline">View My Bookings</a>
                <a href="/rooms" class="btn-primary">Book Another Room</a>
            </div>
        </div>
    </div>
</body>
</html>
