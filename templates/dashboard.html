<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Grand Stay Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }

        nav {
            padding: 20px 60px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(13,13,13,0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226,185,111,0.15); position: sticky; top: 0; z-index: 100;
        }
        .nav-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: #e2b96f; }
        .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; margin-left: 30px; font-size: 14px; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #e2b96f; }
        .nav-links .logout { color: rgba(255,100,100,0.8); }
        .nav-links .logout:hover { color: #ff6b6b; }

        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }

        .hero-section {
            background: linear-gradient(135deg, rgba(226,185,111,0.1), rgba(226,185,111,0.03));
            border: 1px solid rgba(226,185,111,0.15);
            border-radius: 24px; padding: 50px; margin-bottom: 50px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;
        }
        .hero-section h2 { font-family: 'Playfair Display', serif; font-size: 38px; margin-bottom: 10px; }
        .hero-section h2 span { color: #e2b96f; }
        .hero-section p { color: rgba(255,255,255,0.5); font-size: 16px; }
        .hero-badge {
            background: rgba(226,185,111,0.15); border: 1px solid rgba(226,185,111,0.3);
            color: #e2b96f; padding: 10px 20px; border-radius: 30px; font-size: 13px; white-space: nowrap;
        }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 35px 25px; text-align: center;
            text-decoration: none; color: white;
            transition: transform 0.3s, border-color 0.3s, background 0.3s;
            display: block;
        }
        .card:hover { transform: translateY(-6px); border-color: rgba(226,185,111,0.4); background: rgba(226,185,111,0.06); }
        .card-icon { font-size: 40px; margin-bottom: 15px; }
        .card h3 { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.9); }
        .card.logout-card:hover { border-color: rgba(255,100,100,0.4); background: rgba(255,100,100,0.05); }

        .contact-section {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px; padding: 40px;
        }
        .contact-section h3 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 30px; color: #e2b96f; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 25px; }
        .contact-item { text-align: center; }
        .contact-item .icon { font-size: 28px; margin-bottom: 10px; }
        .contact-item p { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.6; }
        .contact-item a { color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.3s; }
        .contact-item a:hover { color: #e2b96f; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">🏨 Grand Stay</div>
        <div class="nav-links">
            <a href="/rooms">Browse Rooms</a>
            <a href="/my-bookings">My Bookings</a>
            <a href="/logout" class="logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="hero-section">
            <div>
                <h2>Welcome back, <span>{{ name }}</span> 👋</h2>
                <p>What would you like to do today?</p>
            </div>
            <div class="hero-badge">✦ Guest Member</div>
        </div>

        <div class="cards-grid">
            <a href="/rooms" class="card">
                <div class="card-icon">🛏️</div>
                <h3>Browse Rooms</h3>
            </a>
            <a href="/my-bookings" class="card">
                <div class="card-icon">📋</div>
                <h3>My Bookings</h3>
            </a>
            <a href="/" class="card">
                <div class="card-icon">🏠</div>
                <h3>Home</h3>
            </a>
            <a href="/logout" class="card logout-card">
                <div class="card-icon">🚪</div>
                <h3>Logout</h3>
            </a>
        </div>

        <div class="contact-section">
            <h3>📞 Contact Us</h3>
            <div class="contact-grid">
                <div class="contact-item">
                    <div class="icon">📍</div>
                    <p>123 Grand Avenue<br>Kigali, Rwanda</p>
                </div>
                <div class="contact-item">
                    <div class="icon">📞</div>
                    <p><a href="tel:+250788000000">+250 788 000 000</a></p>
                </div>
                <div class="contact-item">
                    <div class="icon">✉️</div>
                    <p><a href="mailto:info@grandstay.com">info@grandstay.com</a></p>
                </div>
                <div class="contact-item">
                    <div class="icon">🕐</div>
                    <p>Reception: 24/7</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
